services:
  postgres:
    image: postgres:latest
    container_name: echo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data-v18:/var/lib/postgresql

  elasticsearch:
    image: elastic/elasticsearch:9.4.2
    container_name: echo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data-v19:/usr/share/elasticsearch/data

volumes:
  postgres-data-v18:
  elasticsearch-data-v19:
